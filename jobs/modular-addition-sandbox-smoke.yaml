name: verifier-bottleneck-modular-addition-sandbox-smoke
desc: Run the tiny modular-addition verifier experiment on CPU and export its full record.
cmd: >
  python3 -m verifier_bottleneck.jobs.modular_addition
  --config ${CONFIG}
  --archive ${ARCHIVE}
  --record ${RECORD}
  --summary ${SUMMARY}
  --run-root .job-runs/modular-addition-smoke
  --device cpu
env:
  python:
    type: manual
    version: "3.10"
    pip:
      index-url: https://download.pytorch.org/whl/cpu
      extra-index-urls:
        - https://pypi.org/simple
    requirements-file: requirements-sandbox-job.txt
    local-paths:
      - src/verifier_bottleneck
inputs:
  - configs/sandbox/modular_addition_smoke.yaml: CONFIG
  - pyproject.toml
  - README.md
outputs:
  - modular-addition-sandbox-smoke.zip: ARCHIVE
  - modular-addition-sandbox-smoke-record.json: RECORD
  - modular-addition-sandbox-smoke-summary.json: SUMMARY
cloud-instance-types:
  - c1.4
